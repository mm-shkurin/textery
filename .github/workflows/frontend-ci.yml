name: frontend-ci

# Every branch, not just [main, dev]: this project lands commits directly on the working branch
# and does not use pull requests (.claude/rules/workflow.md), so a main/dev + pull_request trigger
# fired on neither the branch the work happens on nor a PR that never opens — the pipeline was
# green because it had never run. That is the same failure as the decoy frontend/.github/workflows
# deleted in 81f3999, one layer up: a config that looks like a gate and gates nothing.
on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # The two pipelines are kept in step by hand, and hand-kept parity fails silently. This
      # fails loudly instead, comparing the npm scripts each one runs.
      - name: CI parity
        run: npm run ci:parity

      - name: Lint
        run: npm run lint

      # Formatting is checked, not merely configured: a .prettierrc nobody runs is a preference,
      # not a convention. This step is what makes it one.
      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      # Coverage, not a bare test run: the thresholds in vite.config.ts only fire under
      # --coverage, and a floor nobody enforces is a comment. Kept in step with
      # frontend/.github/workflows/ci.yml, the standalone copy for the split repo.
      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

  docker-image:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f infra/docker/frontend.Dockerfile .
        working-directory: .
