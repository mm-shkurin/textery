<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Textery — Выбор типа документа</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-start:#6366f1; --accent-end:#a855f7;
    --accent-gradient:linear-gradient(135deg,var(--accent-start),var(--accent-end));
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif; line-height:1.5;}
  .backdrop{position:fixed; inset:0; background:rgba(8,8,10,0.72); display:flex; align-items:center; justify-content:center;}
  .modal{width:760px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:20px; padding:40px;}
  .modal-header{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px;}
  h1{font-size:26px; font-weight:700;}
  .close-btn{width:36px; height:36px; border-radius:10px; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .close-btn i{width:18px; height:18px; color:var(--text-secondary);}
  .subtitle{color:var(--text-secondary); font-size:15px; margin-bottom:32px;}
  .type-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px;}
  .type-card{background:var(--bg-surface-raised); border-radius:16px; padding:24px; border:1px solid var(--border-subtle); position:relative; cursor:pointer;}
  .type-card.active{border:1.5px solid transparent; background-image:linear-gradient(var(--bg-surface-raised),var(--bg-surface-raised)), var(--accent-gradient); background-origin:border-box; background-clip:padding-box, border-box;}
  .type-card.disabled{opacity:0.45; cursor:not-allowed;}
  .icon-badge{width:48px; height:48px; border-radius:12px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; margin-bottom:16px;}
  .icon-badge i{color:#fff; width:24px; height:24px;}
  .type-name{font-size:17px; font-weight:700;}
  .soon-pill{position:absolute; top:16px; right:16px; background:var(--bg-page); color:var(--text-muted); font-size:11px; padding:4px 10px; border-radius:999px;}
  .check-badge{position:absolute; top:16px; right:16px; width:22px; height:22px; border-radius:50%; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center;}
  .check-badge i{width:14px; height:14px; color:#fff;}
</style>
</head>
<body>
  <div class="backdrop">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h1>Создание документа</h1>
        </div>
        <div class="close-btn"><i data-lucide="x"></i></div>
      </div>
      <p class="subtitle">Выберите тип работы, который будете создавать</p>
      <div class="type-grid">
        <div class="type-card active">
          <div class="check-badge"><i data-lucide="check"></i></div>
          <div class="icon-badge"><i data-lucide="presentation"></i></div>
          <div class="type-name">Доклад</div>
        </div>
        <div class="type-card disabled">
          <span class="soon-pill">скоро</span>
          <div class="icon-badge"><i data-lucide="feather"></i></div>
          <div class="type-name">Эссе</div>
        </div>
        <div class="type-card disabled">
          <span class="soon-pill">скоро</span>
          <div class="icon-badge"><i data-lucide="pen-line"></i></div>
          <div class="type-name">Сочинение</div>
        </div>
        <div class="type-card disabled">
          <span class="soon-pill">скоро</span>
          <div class="icon-badge"><i data-lucide="book-open"></i></div>
          <div class="type-name">Реферат</div>
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
