<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Textery — Новая генерация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-start:#6366f1; --accent-end:#a855f7;
    --accent-gradient:linear-gradient(135deg,var(--accent-start),var(--accent-end));
    --warning:#f59e0b; --success:#22c55e; --error:#ef4444;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif; line-height:1.5;}
  .header{display:flex; align-items:center; justify-content:space-between; padding:20px 48px; border-bottom:1px solid var(--border-subtle);}
  .logo{display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .logo-mark{width:32px; height:32px; border-radius:9px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff;}
  .header-actions{display:flex; align-items:center; gap:12px;}
  .btn{border:none; border-radius:10px; padding:12px 22px; font-family:inherit; font-weight:600; font-size:14px; cursor:pointer;}
  .btn-secondary{background:transparent; color:var(--text-secondary); border:1px solid var(--border-subtle);}
  .btn-primary{background:#f5f5f7; color:#111214;}
  .btn-primary:disabled, .btn-primary.disabled{background:var(--bg-surface-raised); color:var(--text-muted); cursor:not-allowed;}
  .container{max-width:1200px; margin:0 auto; padding:48px 24px 96px;}
  h1{font-size:40px; font-weight:700; letter-spacing:-0.02em; margin-bottom:8px;}
  .subtitle{color:var(--text-secondary); font-size:16px; margin-bottom:40px;}
  .breadcrumb{display:flex; align-items:center; gap:10px; margin-bottom:32px;}
  .breadcrumb-back{display:flex; align-items:center; gap:6px; color:var(--text-muted); font-size:13px; cursor:pointer;}
  .breadcrumb-back i{width:14px; height:14px;}
  .breadcrumb-chip{display:flex; align-items:center; gap:8px; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); padding:6px 14px; border-radius:999px; font-size:13px;}
  .breadcrumb-chip .icon-badge{width:20px; height:20px; border-radius:6px; margin:0;}
  .breadcrumb-chip .icon-badge i{width:12px; height:12px;}
  .icon-badge{background:var(--accent-gradient); display:flex; align-items:center; justify-content:center;}
  .icon-badge i{color:#fff;}
  .form-card{background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:40px; max-width:720px;}
  .field{margin-bottom:24px;}
  label{display:block; font-size:14px; font-weight:600; margin-bottom:8px; color:var(--text-primary);}
  .hint{font-size:13px; color:var(--text-muted); margin-top:6px;}
  input, textarea{width:100%; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); border-radius:10px; padding:14px 16px; font-family:inherit; font-size:15px; color:var(--text-primary);}
  input:focus, textarea:focus{outline:none; border-color:var(--border-strong);}
  textarea{resize:vertical; min-height:88px;}
  input::placeholder, textarea::placeholder{color:var(--text-muted);}
  .row-2{display:grid; grid-template-columns:1fr 160px; gap:16px;}
  .required::after{content:" *"; color:var(--error);}
  .submit-row{display:flex; align-items:center; gap:16px; margin-top:32px;}
  .submit-row .btn-primary{padding:14px 32px; font-size:15px;}
</style>
</head>
<body>
  <div class="header">
    <div class="logo"><div class="logo-mark">T</div>Textery</div>
    <div class="header-actions">
      <button class="btn btn-secondary">Вход</button>
      <button class="btn btn-primary">Попробовать бесплатно</button>
    </div>
  </div>
  <div class="container">
    <div class="breadcrumb">
      <div class="breadcrumb-back"><i data-lucide="arrow-left"></i>Назад</div>
      <div class="breadcrumb-chip"><div class="icon-badge"><i data-lucide="presentation"></i></div>Доклад</div>
      <div class="breadcrumb-chip"><div class="icon-badge"><i data-lucide="sparkles"></i></div>Автоматический режим</div>
    </div>
    <h1>Новая генерация</h1>
    <p class="subtitle">Опишите, что нужно получить</p>

    <div class="form-card">
      <div class="field">
        <label class="required">Тема доклада</label>
        <input type="text" placeholder="Например: Влияние искусственного интеллекта на образование">
      </div>
      <div class="row-2">
        <div class="field">
          <label>Требования</label>
          <textarea placeholder="Например: официально-деловой стиль, ссылки на источники"></textarea>
        </div>
        <div class="field">
          <label class="required">Объём, страниц</label>
          <input type="number" min="1" max="10" value="5">
          <div class="hint">от 1 до 10</div>
        </div>
      </div>
      <div class="field">
        <label>Дополнительные пожелания</label>
        <textarea placeholder="Что-то ещё, что стоит учесть при генерации"></textarea>
      </div>
      <div class="submit-row">
        <button class="btn btn-primary"><i data-lucide="sparkles" style="width:16px;height:16px;vertical-align:-3px;margin-right:6px;"></i>Сгенерировать</button>
        <span class="hint">Обычно занимает 1–2 минуты</span>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
