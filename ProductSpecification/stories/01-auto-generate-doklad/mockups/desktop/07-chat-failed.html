<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Textery — Ошибка генерации</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-start:#6366f1; --accent-end:#a855f7;
    --accent-gradient:linear-gradient(135deg,var(--accent-start),var(--accent-end));
    --error:#ef4444;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif; line-height:1.5;}
  .header{display:flex; align-items:center; justify-content:space-between; padding:20px 48px; border-bottom:1px solid var(--border-subtle);}
  .logo{display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .logo-mark{width:32px; height:32px; border-radius:9px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff;}
  .header-actions{display:flex; align-items:center; gap:12px;}
  .btn{border:none; border-radius:10px; padding:12px 22px; font-family:inherit; font-weight:600; font-size:14px; cursor:pointer;}
  .btn-secondary{background:transparent; color:var(--text-secondary); border:1px solid var(--border-subtle);}
  .btn-primary{background:#f5f5f7; color:#111214;}
  .container{max-width:1100px; margin:0 auto; padding:40px 24px 96px;}
  .badge{display:inline-flex; align-items:center; gap:8px; background:var(--bg-surface-raised); padding:6px 14px; border-radius:999px; font-size:13px; font-weight:600; margin-bottom:20px;}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--error);}
  .layout{display:grid; grid-template-columns:320px 1fr; gap:24px;}
  .chat-panel{background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:24px; height:fit-content;}
  .chat-panel h3{font-size:14px; color:var(--text-secondary); margin-bottom:16px; text-transform:uppercase; letter-spacing:0.04em;}
  .chat-msg{display:flex; gap:10px; margin-bottom:16px;}
  .chat-avatar{width:28px; height:28px; border-radius:8px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .chat-avatar.error-avatar{background:rgba(239,68,68,0.15);}
  .chat-avatar i{width:15px; height:15px; color:#fff;}
  .chat-avatar.error-avatar i{color:var(--error);}
  .chat-bubble{background:var(--bg-surface-raised); border-radius:10px; padding:10px 12px; font-size:13px; color:var(--text-secondary);}
  .chat-bubble.error{color:var(--error);}
  .doc-area{background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:48px; display:flex; align-items:center; justify-content:center; min-height:420px;}
  .doc-placeholder{text-align:center; max-width:380px;}
  .icon-circle{width:64px; height:64px; border-radius:50%; background:rgba(239,68,68,0.12); display:flex; align-items:center; justify-content:center; margin:0 auto 24px;}
  .icon-circle i{color:var(--error); width:30px; height:30px;}
  .doc-placeholder h2{font-size:20px; margin-bottom:10px;}
  .doc-placeholder p{color:var(--text-secondary); font-size:14px; margin-bottom:24px;}
</style>
</head>
<body>
  <div class="header">
    <div class="logo"><div class="logo-mark">T</div>Textery</div>
    <div class="header-actions">
      <button class="btn btn-secondary">Вход</button>
      <button class="btn btn-primary">Попробовать бесплатно</button>
    </div>
  </div>
  <div class="container">
    <div class="badge"><span class="dot"></span>Ошибка</div>
    <div class="layout">
      <div class="chat-panel">
        <h3>Ход генерации</h3>
        <div class="chat-msg">
          <div class="chat-avatar"><i data-lucide="sparkles"></i></div>
          <div class="chat-bubble">Анализирую тему и требования</div>
        </div>
        <div class="chat-msg">
          <div class="chat-avatar error-avatar"><i data-lucide="x"></i></div>
          <div class="chat-bubble error">Не удалось завершить</div>
        </div>
      </div>
      <div class="doc-area">
        <div class="doc-placeholder">
          <div class="icon-circle"><i data-lucide="x-circle"></i></div>
          <h2>Не удалось сгенерировать доклад</h2>
          <p>Попробуйте создать новый запрос. Если ошибка повторится — измените тему или требования.</p>
          <button class="btn btn-primary">Создать новый запрос</button>
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
