<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Textery — Word онлайн с генерацией через нейросеть</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-start:#6366f1; --accent-end:#a855f7;
    --accent-gradient:linear-gradient(135deg,var(--accent-start),var(--accent-end));
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif; line-height:1.5;}
  .header{display:flex; align-items:center; justify-content:space-between; padding:20px 48px; border-bottom:1px solid var(--border-subtle);}
  .logo{display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .logo-mark{width:32px; height:32px; border-radius:9px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff;}
  .header-actions{display:flex; align-items:center; gap:12px;}
  .btn{border:none; border-radius:10px; padding:12px 22px; font-family:inherit; font-weight:600; font-size:14px; cursor:pointer;}
  .btn-secondary{background:transparent; color:var(--text-secondary); border:1px solid var(--border-subtle);}
  .btn-primary{background:#f5f5f7; color:#111214;}
  .hero{max-width:900px; margin:0 auto; padding:96px 24px 64px; text-align:center;}
  .eyebrow{display:inline-flex; align-items:center; gap:8px; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); padding:8px 16px; border-radius:999px; font-size:13px; color:var(--text-secondary); margin-bottom:24px;}
  h1{font-size:48px; font-weight:700; letter-spacing:-0.02em; margin-bottom:16px;}
  .accent{background:var(--accent-gradient); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .subtitle{color:var(--text-secondary); font-size:18px; max-width:560px; margin:0 auto 40px;}
  .cta-row{display:flex; justify-content:center; gap:12px;}
  .btn-primary.large{padding:16px 32px; font-size:16px;}
  .btn-secondary.large{padding:16px 32px; font-size:16px;}
  .hero-preview{max-width:1100px; margin:64px auto 0; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:20px; padding:48px; display:flex; align-items:center; justify-content:center; gap:24px;}
  .preview-card{width:200px; height:260px; background:var(--bg-surface-raised); border-radius:14px; border:1px solid var(--border-subtle); display:flex; align-items:center; justify-content:center;}
  .preview-card i{color:var(--text-muted); width:40px; height:40px;}
  .preview-card.tall{height:320px; border:1px solid transparent; background-image:linear-gradient(var(--bg-surface-raised),var(--bg-surface-raised)), var(--accent-gradient); background-origin:border-box; background-clip:padding-box, border-box;}
  .social-proof{text-align:center; margin-top:40px; color:var(--text-muted); font-size:13px;}
</style>
</head>
<body>
  <div class="header">
    <div class="logo"><div class="logo-mark">T</div>Textery</div>
    <div class="header-actions">
      <button class="btn btn-secondary">Вход</button>
      <button class="btn btn-primary">Попробовать бесплатно</button>
    </div>
  </div>
  <div class="hero">
    <div class="eyebrow"><i data-lucide="sparkles" style="width:14px;height:14px;"></i>Работает на Textery AI</div>
    <h1>Word онлайн <span class="accent">с генерацией через нейросеть</span></h1>
    <p class="subtitle">Доклады, эссе, сочинения и рефераты — опишите тему, получите готовый текст и доработайте его во встроенном редакторе.</p>
    <div class="cta-row">
      <button class="btn btn-primary large"><i data-lucide="sparkles" style="width:16px;height:16px;vertical-align:-3px;margin-right:8px;"></i>Попробовать бесплатно</button>
      <button class="btn btn-secondary large">Как это работает</button>
    </div>
    <div class="hero-preview">
      <div class="preview-card"><i data-lucide="file-text"></i></div>
      <div class="preview-card tall"><i data-lucide="presentation"></i></div>
      <div class="preview-card"><i data-lucide="book-open"></i></div>
    </div>
    <div class="social-proof">Нам доверяют тысячи пользователей — присоединяйтесь!</div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
