<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>Textery — Новая генерация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-start:#6366f1; --accent-end:#a855f7;
    --accent-gradient:linear-gradient(135deg,var(--accent-start),var(--accent-end));
    --warning:#f59e0b; --success:#22c55e; --error:#ef4444;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif; line-height:1.5;}
  .header{display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--border-subtle);}
  .logo{display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px;}
  .logo-mark{width:28px; height:28px; border-radius:8px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:14px;}
  .btn{border:none; border-radius:10px; padding:10px 16px; font-family:inherit; font-weight:600; font-size:13px; cursor:pointer;}
  .btn-primary{background:#f5f5f7; color:#111214;}
  .container{padding:24px 16px 48px;}
  h1{font-size:26px; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px;}
  .subtitle{color:var(--text-secondary); font-size:14px; margin-bottom:24px;}
  .breadcrumb{display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:20px;}
  .breadcrumb-back{display:flex; align-items:center; gap:5px; color:var(--text-muted); font-size:12px;}
  .breadcrumb-back i{width:12px; height:12px;}
  .breadcrumb-chip{display:flex; align-items:center; gap:6px; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); padding:5px 12px; border-radius:999px; font-size:12px;}
  .icon-badge{width:18px; height:18px; border-radius:6px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center;}
  .icon-badge i{color:#fff; width:11px; height:11px;}
  .form-card{background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:14px; padding:20px;}
  .field{margin-bottom:18px;}
  label{display:block; font-size:13px; font-weight:600; margin-bottom:6px;}
  .hint{font-size:12px; color:var(--text-muted); margin-top:5px;}
  input, textarea{width:100%; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); border-radius:10px; padding:12px 14px; font-family:inherit; font-size:14px; color:var(--text-primary);}
  textarea{resize:vertical; min-height:72px;}
  input::placeholder, textarea::placeholder{color:var(--text-muted);}
  .required::after{content:" *"; color:var(--error);}
  .submit-row{margin-top:8px;}
  .submit-row .btn-primary{width:100%; padding:14px; font-size:14px; text-align:center;}
  .submit-hint{text-align:center; margin-top:10px;}
</style>
</head>
<body>
  <div class="header">
    <div class="logo"><div class="logo-mark">T</div>Textery</div>
    <button class="btn btn-primary">Попробовать</button>
  </div>
  <div class="container">
    <div class="breadcrumb">
      <div class="breadcrumb-back"><i data-lucide="arrow-left"></i>Назад</div>
      <div class="breadcrumb-chip"><div class="icon-badge"><i data-lucide="presentation"></i></div>Доклад</div>
      <div class="breadcrumb-chip"><div class="icon-badge"><i data-lucide="sparkles"></i></div>Авто</div>
    </div>
    <h1>Новая генерация</h1>
    <p class="subtitle">Опишите, что нужно получить</p>

    <div class="form-card">
      <div class="field">
        <label class="required">Тема доклада</label>
        <input type="text" placeholder="Например: ИИ в образовании">
      </div>
      <div class="field">
        <label class="required">Объём, страниц</label>
        <input type="number" min="1" max="10" value="5">
        <div class="hint">от 1 до 10</div>
      </div>
      <div class="field">
        <label>Требования</label>
        <textarea placeholder="Например: официальный стиль"></textarea>
      </div>
      <div class="field">
        <label>Дополнительные пожелания</label>
        <textarea placeholder="Что-то ещё"></textarea>
      </div>
      <div class="submit-row">
        <button class="btn btn-primary"><i data-lucide="sparkles" style="width:14px;height:14px;vertical-align:-2px;margin-right:6px;"></i>Сгенерировать</button>
        <div class="hint submit-hint">Обычно занимает 1–2 минуты</div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
