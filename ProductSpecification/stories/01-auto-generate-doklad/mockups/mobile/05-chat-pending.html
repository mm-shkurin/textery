<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>Textery — Генерация в процессе</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-start:#6366f1; --accent-end:#a855f7;
    --accent-gradient:linear-gradient(135deg,var(--accent-start),var(--accent-end));
    --warning:#f59e0b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif; line-height:1.5;}
  .header{display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--border-subtle);}
  .logo{display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px;}
  .logo-mark{width:28px; height:28px; border-radius:8px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:14px;}
  .btn-primary{border:none; background:#f5f5f7; color:#111214; border-radius:10px; padding:10px 16px; font-family:inherit; font-weight:600; font-size:13px;}
  .container{padding:20px 16px 48px;}
  .badge{display:inline-flex; align-items:center; gap:8px; background:var(--bg-surface-raised); padding:6px 14px; border-radius:999px; font-size:12px; font-weight:600; margin-bottom:16px;}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--warning);}
  .chat-panel{background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:14px; padding:16px; margin-bottom:16px;}
  .chat-msg{display:flex; gap:8px; margin-bottom:10px;}
  .chat-msg:last-child{margin-bottom:0;}
  .chat-avatar{width:24px; height:24px; border-radius:7px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .chat-avatar i{width:13px; height:13px; color:#fff;}
  .chat-bubble{background:var(--bg-surface-raised); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--text-secondary);}
  .chat-bubble.active{color:var(--text-primary);}
  .typing-dots{display:inline-flex; gap:3px; margin-left:4px;}
  .typing-dots span{width:4px; height:4px; border-radius:50%; background:var(--text-muted); animation:blink 1.4s infinite both;}
  .typing-dots span:nth-child(2){animation-delay:0.2s;}
  .typing-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{0%,80%,100%{opacity:0.2;} 40%{opacity:1;}}
  .doc-area{background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:14px; padding:32px 20px; text-align:center;}
  .spinner{width:48px; height:48px; border-radius:50%; margin:0 auto 20px; background:conic-gradient(var(--accent-start), var(--accent-end), transparent); -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px)); mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px)); animation:spin 1.1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .doc-area h2{font-size:16px; margin-bottom:8px;}
  .doc-area p{color:var(--text-secondary); font-size:13px;}
</style>
</head>
<body>
  <div class="header">
    <div class="logo"><div class="logo-mark">T</div>Textery</div>
    <button class="btn-primary">Попробовать</button>
  </div>
  <div class="container">
    <div class="badge"><span class="dot"></span>В обработке</div>
    <div class="chat-panel">
      <div class="chat-msg">
        <div class="chat-avatar"><i data-lucide="sparkles"></i></div>
        <div class="chat-bubble">Анализирую тему</div>
      </div>
      <div class="chat-msg">
        <div class="chat-avatar"><i data-lucide="sparkles"></i></div>
        <div class="chat-bubble active">ИИ пишет доклад<span class="typing-dots"><span></span><span></span><span></span></span></div>
      </div>
    </div>
    <div class="doc-area">
      <div class="spinner"></div>
      <h2>Готовим ваш доклад</h2>
      <p>Обычно занимает 1–2 минуты</p>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
