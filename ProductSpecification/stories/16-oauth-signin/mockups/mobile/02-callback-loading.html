<!-- Story 16 — OAuth sign-in. Mobile, 375px. Mirrors desktop/02-callback-loading.html. -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>Завершаем вход — Textery AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page:#111214; --bg-surface:#1a1b1e; --border-subtle:rgba(255,255,255,0.08);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3;
    --accent-gradient:linear-gradient(135deg,#6366f1,#a855f7);
    --accent-start:#6366f1; --accent-end:#a855f7;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--bg-page); color:var(--text-primary); }
  header { display:flex; align-items:center; padding:16px; }
  .logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px; }
  .logo-mark { width:28px; height:28px; border-radius:7px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
  main { padding:48px 16px; }
  .card { background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:40px 24px; text-align:center; }
  .spinner { width:44px; height:44px; margin:0 auto 20px; border-radius:50%; background:conic-gradient(from 0deg, var(--accent-start), var(--accent-end), transparent 75%); -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0); mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0); animation:spin 0.9s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  h1 { font-size:18px; font-weight:700; letter-spacing:-0.02em; margin-bottom:8px; }
  .subtitle { color:var(--text-secondary); font-size:13px; line-height:1.5; }
</style>
</head>
<body>
<header><div class="logo"><div class="logo-mark">T</div>Textery</div></header>
<main>
  <div class="card">
    <div class="spinner"></div>
    <h1>Завершаем вход через VK ID</h1>
    <p class="subtitle">Это займёт пару секунд. Не закрывайте страницу.</p>
  </div>
</main>
</body>
</html>
