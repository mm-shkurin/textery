<!-- Story 16 — OAuth sign-in. Desktop, 1400px. Extends Story 7 desktop/03-login.html
     verbatim (same card/tokens/footer) and ADDS the OAuth block below the email/password
     form: an "или" divider + two provider buttons (VK ID, Yandex ID). Login-only per spec.
     Buttons are full-page navigations to the backend start endpoint (backend-mediated) —
     no provider SDK/script on the client. Provider brand tints on the monogram badge only;
     the button chrome stays the app's secondary-button style. -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Вход — Textery AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-start:#6366f1; --accent-end:#a855f7;
    --accent-gradient:linear-gradient(135deg,var(--accent-start),var(--accent-end));
    --error:#ef4444; --vk:#0077ff; --yandex:#fc3f1d;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--bg-page); color:var(--text-primary); min-height:100vh; }
  header { display:flex; align-items:center; padding:24px 64px; }
  .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px; }
  .logo-mark { width:32px; height:32px; border-radius:8px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; }
  main { display:flex; justify-content:center; padding:48px 24px 96px; }
  .card { width:420px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:40px; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-0.02em; margin-bottom:8px; }
  .subtitle { color:var(--text-secondary); font-size:14px; margin-bottom:28px; }
  label { display:block; font-size:14px; color:var(--text-secondary); margin-bottom:8px; font-weight:500; }
  .field { margin-bottom:20px; }
  .field-wrap { position:relative; }
  input { width:100%; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); border-radius:10px; padding:14px 16px; color:var(--text-primary); font-size:16px; font-family:inherit; }
  input:focus { outline:none; border-color:var(--border-strong); }
  input::placeholder { color:var(--text-muted); }
  .eye-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); cursor:pointer; display:flex; }
  .btn-primary { width:100%; background:#f5f5f7; color:#111214; border:none; border-radius:10px; padding:14px 24px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; }
  .footer-link { text-align:center; margin-top:24px; font-size:14px; color:var(--text-secondary); }
  .footer-link a { color:var(--text-primary); font-weight:500; text-decoration:none; }
  .divider { display:flex; align-items:center; gap:12px; margin:24px 0; color:var(--text-muted); font-size:13px; }
  .divider::before, .divider::after { content:""; flex:1; height:1px; background:var(--border-subtle); }
  .oauth-list { display:flex; flex-direction:column; gap:12px; }
  .btn-oauth { display:flex; align-items:center; gap:12px; width:100%; background:transparent; border:1px solid var(--border-subtle); border-radius:10px; padding:12px 16px; color:var(--text-primary); font-size:15px; font-weight:500; font-family:inherit; cursor:pointer; text-decoration:none; transition:border-color .15s; }
  .btn-oauth:hover { border-color:var(--border-strong); }
  .provider-badge { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; }
  .provider-badge.vk { background:var(--vk); }
  .provider-badge.yandex { background:var(--yandex); }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-mark">T</div>Textery</div>
</header>
<main>
  <div class="card">
    <h1>Вход в Textery AI</h1>
    <p class="subtitle">Введите свои данные для продолжения работы</p>
    <form>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="email@example.ru">
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <div class="field-wrap">
          <input id="password" type="password" placeholder="Пароль">
          <span class="eye-toggle"><i data-lucide="eye" width="18" height="18"></i></span>
        </div>
      </div>
      <button type="submit" class="btn-primary">Войти</button>
    </form>
    <div class="divider">или</div>
    <div class="oauth-list">
      <!-- full-page nav to GET /api/v1/auth/oauth/vk/start (backend-mediated) -->
      <a class="btn-oauth" href="#"><span class="provider-badge vk">VK</span>Войти через VK ID</a>
      <!-- full-page nav to GET /api/v1/auth/oauth/yandex/start -->
      <a class="btn-oauth" href="#"><span class="provider-badge yandex">Я</span>Войти через Yandex ID</a>
    </div>
    <p class="footer-link">Нет аккаунта? <a href="../../../07-authorization/mockups/desktop/01-register.html">Зарегистрироваться</a></p>
  </div>
</main>
<script>lucide.createIcons();</script>
</body>
</html>
