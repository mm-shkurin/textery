<!-- Story 7 — Authorization. Mobile, 375px. Mirrors desktop/03-login.html. -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>Вход — Textery AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --accent-gradient:linear-gradient(135deg,#6366f1,#a855f7); --error:#ef4444;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--bg-page); color:var(--text-primary); }
  header { display:flex; align-items:center; padding:16px; }
  .logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px; }
  .logo-mark { width:28px; height:28px; border-radius:7px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
  main { padding:8px 16px 48px; }
  h1 { font-size:22px; font-weight:700; letter-spacing:-0.02em; margin-bottom:8px; }
  .subtitle { color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
  label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; font-weight:500; }
  .field { margin-bottom:16px; }
  .field-wrap { position:relative; }
  input { width:100%; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); border-radius:10px; padding:14px 16px; color:var(--text-primary); font-size:15px; font-family:inherit; min-height:44px; }
  input::placeholder { color:var(--text-muted); }
  .eye-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); display:flex; }
  .btn-primary { width:100%; background:#f5f5f7; color:#111214; border:none; border-radius:10px; padding:14px 24px; font-size:15px; font-weight:600; min-height:44px; margin-top:4px; }
  .footer-link { text-align:center; margin-top:20px; font-size:13px; color:var(--text-secondary); }
  .footer-link a { color:var(--text-primary); font-weight:500; text-decoration:none; }
  .error-banner { display:flex; align-items:center; gap:8px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:10px 12px; margin-bottom:16px; font-size:13px; color:var(--error); }
</style>
</head>
<body>
<header><div class="logo"><div class="logo-mark">T</div>Textery</div></header>
<main>
  <h1>Вход</h1>
  <p class="subtitle">Введите свои данные для продолжения работы</p>
  <div class="error-banner"><i data-lucide="alert-circle" width="14" height="14"></i>Неверный email или пароль</div>
  <form>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="email@example.ru">
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <div class="field-wrap">
        <input id="password" type="password" placeholder="Пароль">
        <span class="eye-toggle"><i data-lucide="eye" width="16" height="16"></i></span>
      </div>
    </div>
    <button type="submit" class="btn-primary">Войти</button>
  </form>
  <p class="footer-link">Нет аккаунта? <a href="01-register.html">Зарегистрироваться</a></p>
</main>
<script>lucide.createIcons();</script>
</body>
</html>
