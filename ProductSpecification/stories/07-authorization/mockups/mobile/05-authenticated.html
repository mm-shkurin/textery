<!-- Story 7 — Authorization. Mobile, 375px. Mirrors desktop/05-authenticated.html. -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>Textery AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3;
    --accent-gradient:linear-gradient(135deg,#6366f1,#a855f7);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--bg-page); color:var(--text-primary); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--border-subtle); }
  .logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px; }
  .logo-mark { width:28px; height:28px; border-radius:7px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
  .avatar { width:28px; height:28px; border-radius:50%; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; }
  main { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 24px; text-align:center; }
  .icon-badge { width:56px; height:56px; border-radius:14px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; margin-bottom:20px; }
  h1 { font-size:22px; font-weight:700; letter-spacing:-0.02em; margin-bottom:10px; }
  .subtitle { color:var(--text-secondary); font-size:14px; line-height:1.5; }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-mark">T</div>Textery</div>
  <div class="avatar">M</div>
</header>
<main>
  <div class="icon-badge"><i data-lucide="check-circle" color="white" width="26" height="26"></i></div>
  <h1>Вы авторизованы</h1>
  <p class="subtitle">Сессия активна. Раздел генерации документов появится здесь по мере готовности других историй.</p>
</main>
<script>lucide.createIcons();</script>
</body>
</html>
