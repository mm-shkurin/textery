<!-- Story 7 — Authorization. Desktop, 1400px. Distinct error state per 07_Authorization.md
     Screen States ("Account-locked error state"), reached after N consecutive failed
     login attempts (see 07_Authorization_Notes.md lockout cooldown). -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Аккаунт заблокирован — Textery AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-page:#111214; --bg-surface:#1a1b1e; --bg-surface-raised:#232428;
    --border-subtle:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text-primary:#f5f5f7; --text-secondary:#9a9ba3; --text-muted:#6b6c74;
    --error:#ef4444;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--bg-page); color:var(--text-primary); min-height:100vh; }
  header { display:flex; align-items:center; padding:24px 64px; }
  .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px; }
  .logo-mark { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#6366f1,#a855f7); display:flex; align-items:center; justify-content:center; font-weight:700; }
  main { display:flex; justify-content:center; padding:64px 24px 96px; }
  .card { width:440px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:40px; text-align:center; }
  .icon-badge { width:56px; height:56px; border-radius:12px; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
  h1 { font-size:24px; font-weight:700; letter-spacing:-0.02em; margin-bottom:12px; }
  .subtitle { color:var(--text-secondary); font-size:14px; margin-bottom:24px; line-height:1.5; }
  .timer-pill { display:inline-block; background:var(--bg-surface-raised); border:1px solid var(--border-subtle); border-radius:999px; padding:8px 20px; font-size:14px; font-weight:600; margin-bottom:28px; }
  .btn-secondary { width:100%; background:transparent; border:1px solid var(--border-subtle); color:var(--text-secondary); border-radius:10px; padding:14px 24px; font-size:16px; font-weight:600; cursor:pointer; text-decoration:none; display:block; }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-mark">T</div>Textery</div>
</header>
<main>
  <div class="card">
    <div class="icon-badge"><i data-lucide="lock" color="#ef4444" width="26" height="26"></i></div>
    <h1>Аккаунт временно заблокирован</h1>
    <p class="subtitle">Слишком много неудачных попыток входа. Попробуйте снова через некоторое время.</p>
    <div class="timer-pill">Повторная попытка через 04:52</div>
    <a href="03-login.html" class="btn-secondary">Вернуться ко входу</a>
  </div>
</main>
<script>lucide.createIcons();</script>
</body>
</html>
