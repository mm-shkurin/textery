openapi: 3.0.3
info:
  title: Get Document
  version: 1.0.0

paths:
  /api/v1/documents/{document_id}:
    get:
      summary: Fetch a document (reopen for continued manual editing)
      operationId: getDocument
      tags:
        - documents
      security:
        - bearerAuth: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '401':
          description: Missing, malformed, expired, or non-access Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: >
            No document with this id FOR THIS OWNER. A document owned by another
            account is indistinguishable from one that does not exist — never 403,
            which would confirm the id exists. See
            decisions/document-ownership-decision.md.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error — generic client-safe message only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from POST /api/v1/auth/login.
  schemas:
    Error:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
        message:
          type: string
    DocumentResponse:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
        status:
          type: string
          enum: [draft]
        content:
          type: string
          description: Sanitized HTML; reflects the last successfully saved state (post-sanitization, not necessarily byte-identical to what was submitted).
        version:
          type: integer
          description: Optimistic-concurrency token; required on subsequent PUT.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
