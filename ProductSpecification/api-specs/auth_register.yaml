openapi: 3.0.3
info:
  title: Register
  version: 1.0.0

paths:
  /api/v1/auth/register:
    post:
      summary: Create a pending account (email+password) and issue a mocked verification code
      operationId: registerUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: >
            Account created (is_verified=false). verification_code is the mocked code —
            returned here because no real email is sent (see 07_Authorization.md).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: >
            Validation error — malformed email, email over 255 chars, password failing
            policy (min 8/max 128 chars, digit+upper+lower+special), or password/
            confirm_password mismatch.
        '409':
          description: Email already registered (verified or pending) — duplicate.
        '422':
          description: >
            Request body contains a server-owned field (is_verified, id, created_at) —
            rejected rather than silently ignored (hazard-scan group 5 mass-assignment
            guard).
        '500':
          description: Internal server error — generic client-safe message only.

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - confirm_password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Case-folded (lowercased) before uniqueness check and storage.
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: >
            Must contain >=1 digit, >=1 uppercase, >=1 lowercase, >=1 special char.
            NFC-normalized before hashing (hazard-scan group 1 guard).
        confirm_password:
          type: string
    RegisterResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        is_verified:
          type: boolean
          enum: [false]
        verification_code:
          type: string
          pattern: '^[0-9]{6}$'
          description: >
            6-digit string, zero-padded, never an integer (hazard-scan group 1 guard).
            Mocked — this is the only delivery channel, no email is sent.
        code_expires_at:
          type: string
          format: date-time
