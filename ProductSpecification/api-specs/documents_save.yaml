openapi: 3.0.3
info:
  title: Save Document Content
  version: 1.0.0

paths:
  /api/v1/documents/{document_id}:
    put:
      summary: Save the full editor content for a manual document
      operationId: saveDocument
      tags:
        - documents
      security:
        - bearerAuth: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveDocumentRequest'
      responses:
        '200':
          description: Saved — idempotent for identical (content, version); response reflects the sanitized, persisted content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: >
            content exceeds max length (200,000 characters) — rejected whole, never
            truncated. Measured on the NFC-normalized string in Unicode code points,
            BEFORE sanitization: sanitizing first would parse an adversarial payload
            before rejecting it, and escaping (< becomes &lt;) can push a legitimate
            200,000-character input over a post-sanitize limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing, malformed, expired, or non-access Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: >
            No document with this id FOR THIS OWNER. A document owned by another
            account is indistinguishable from one that does not exist — never 403,
            which would confirm the id exists. Takes precedence over 409: a foreign
            document never reaches the version check, so the response cannot disclose
            that the submitted version was correct.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: version does not match current state — another save landed first (lost-update guard); client must refetch and retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >
            version is absent or not an integer. Server-owned fields (document_type,
            id, status) in the body are IGNORED, not rejected — see
            decisions/server-owned-fields-ignored-decision.md.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error — generic client-safe message only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from POST /api/v1/auth/login.
  schemas:
    Error:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
        message:
          type: string
    SaveDocumentRequest:
      type: object
      required:
        - content
        - version
      properties:
        content:
          type: string
          maxLength: 200000
          description: Full document content (not a partial patch); sanitized server-side before persist.
        version:
          type: integer
          description: Must match the document's current version; stale value returns 409.
    DocumentResponse:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
        status:
          type: string
          enum: [draft]
        content:
          type: string
        version:
          type: integer
          description: Incremented on each successful save.
        updated_at:
          type: string
          format: date-time
