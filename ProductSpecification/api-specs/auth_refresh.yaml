openapi: 3.0.3
info:
  title: Refresh Access Token
  version: 1.0.0

paths:
  /api/v1/auth/refresh:
    post:
      summary: Exchange a valid refresh token for a new access token
      operationId: refreshAccessToken
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: >
            Refresh token invalid, expired, or unrecognized (including a token issued
            under a rotated signing key or an old claim shape — rejected cleanly, not a
            crash; hazard-scan group 4 schema-evolution guard). Generic client-safe
            message only.
        '500':
          description: Internal server error — generic client-safe message only.

components:
  schemas:
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        access_token_expires_at:
          type: string
          format: date-time
