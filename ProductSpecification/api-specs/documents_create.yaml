openapi: 3.0.3
info:
  title: Create Manual Document
  version: 1.0.0

paths:
  /api/v1/documents:
    post:
      summary: Create an empty document for manual (non-AI) editing
      operationId: createDocument
      tags:
        - documents
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: >
            Client-generated key. Replaying the same key returns the existing
            document (200) instead of creating a new one.
          schema:
            type: string
            minLength: 1
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Document created, empty, no Generation ever created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '200':
          description: >
            Idempotency-Key already seen for this owner — returns the existing document.
            The key is scoped to the owner, so the same key from a different account
            creates a separate document rather than disclosing this one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '401':
          description: >
            Missing, malformed, expired, or non-access Bearer token. A refresh token
            presented here is rejected like any other invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >
            Unsupported document_type, or Idempotency-Key outside 1-128 characters.
            Server-owned fields (status, id, content) in the body are IGNORED, not
            rejected — see decisions/server-owned-fields-ignored-decision.md.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error — generic client-safe message only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Access token from POST /api/v1/auth/login. Documents are owned; see
        decisions/document-ownership-decision.md.
  schemas:
    Error:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
        message:
          type: string
    CreateDocumentRequest:
      type: object
      required:
        - document_type
      properties:
        document_type:
          type: string
          enum: [доклад, эссе, сочинение, реферат]
    DocumentResponse:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
        status:
          type: string
          enum: [draft]
        content:
          type: string
          description: Empty string on creation.
        version:
          type: integer
          description: Optimistic-concurrency token; required on subsequent PUT.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          description: >
            Equals created_at on creation. Present on every DocumentResponse — this
            endpoint previously omitted it while documents_save.yaml returned it, so
            one shape was documented two ways.
