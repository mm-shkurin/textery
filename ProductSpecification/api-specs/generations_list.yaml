openapi: 3.0.3
info:
  title: List Generations
  version: 1.0.0

paths:
  /api/v1/generations:
    get:
      summary: >
        List generations (stand-in for history). Keyset-paginated, never offset/limit.
        NOT IMPLEMENTED — no route backs this spec today.
      description: >
        The "no auth exists yet" premise this spec was written under expired on
        2026-07-17: story 7 shipped /login, and task 4 gave generations an owner.
        Whoever implements this MUST require `Authorization: Bearer` and scope the
        result to the caller's own generations — an unscoped list would re-open the
        cross-account read that task 4 closed on GET /generations/{id}. See
        known-debt.md #4.
      operationId: listGenerations
      tags:
        - generations
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          required: false
          description: Opaque cursor from a previous response's next_cursor. Omit for the first page.
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationListResponse'
        '500':
          description: Internal server error

components:
  schemas:
    GenerationListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GenerationResponse'
        next_cursor:
          type: string
          nullable: true
          description: Pass as `cursor` to fetch the next page; null when there are no more results.
    GenerationResponse:
      type: object
      properties:
        generation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
        document_type:
          type: string
        topic:
          type: string
        volume_pages:
          type: integer
        created_at:
          type: string
          format: date-time
