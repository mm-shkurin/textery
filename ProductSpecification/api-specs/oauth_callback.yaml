openapi: 3.0.3
info:
  title: OAuth provider callback (VK ID / Yandex ID)
  version: 1.0.0

paths:
  /api/v1/auth/oauth/{provider}/callback:
    get:
      summary: >
        Provider redirect target (backend-only, NOT called by the frontend). Validates the
        CSRF state, exchanges the provider code, resolves or auto-creates the account, mints
        a one-time handoff code, and 302-redirects the browser to the frontend /auth/callback.
      operationId: oauthProviderCallback
      tags:
        - auth
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [vk, yandex]
        - name: code
          in: query
          required: false
          description: Authorization code issued by the provider (present on the success leg).
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: CSRF state minted at /start; validated before any exchange.
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: Present when the user cancelled or the provider errored.
          schema:
            type: string
      responses:
        '302':
          description: >
            Redirect to the frontend. On success:
            `{FRONTEND}/auth/callback?code=OPAQUE&provider={provider}` — an opaque, single-use,
            short-TTL handoff code, NEVER a token. On failure (invalid state, provider error,
            user-cancel, no/unverified provider email): `{FRONTEND}/auth/callback?error=CODE`.
            Account resolution auto-creates on first sign-in from the NFC-normalized,
            case-folded provider email (hazard-scan group 1), unique per (provider, subject)
            (group 3); no verification step. The handoff-code mint + account create commit
            atomically (group 2).
          headers:
            Location:
              schema:
                type: string
              description: Frontend /auth/callback URL with either an opaque code or an error.
        '400':
          description: Invalid or missing CSRF state (possible forged callback) — redirected as an error.
