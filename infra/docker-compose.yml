# Real services — no mocks/placeholders. See infra/architecture.md for
# topology, port map, and env var contract.
#
# All ports/credentials come from infra/.env (gitignored; copy from
# infra/.env.example). No literals below, no container_name (avoids collisions
# across parallel worktrees/sessions on the same host).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Real FastAPI app (backend/), migrated via Alembic on boot. Build context
  # is the repo root so the Dockerfile can COPY every backend/ module.
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    # GIGACHAT_CREDENTIALS / GENERATION_PROVIDER and any other backend
    # secrets live in backend/.env, not here.
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Real React/Vite app (frontend/), built and served by nginx. Build context
  # is the repo root so the Dockerfile can COPY frontend/.
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
