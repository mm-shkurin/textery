server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Mirrors the Vite dev proxy (/api -> backend) so the built SPA can call
    # the API through the same origin without a VITE_API_BASE_URL override.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
