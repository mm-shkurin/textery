name: backend-ci

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://textery:textery@localhost:5432/textery
      REDIS_URL: redis://localhost:6379/0
      GENERATION_PROVIDER: fake

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Start postgres and redis
        run: |
          docker run -d --name ci-postgres \
            -e POSTGRES_USER=textery -e POSTGRES_PASSWORD=textery -e POSTGRES_DB=textery \
            -p 5432:5432 postgres:16
          docker run -d --name ci-redis -p 6379:6379 redis:7

      - name: Wait for postgres and redis
        run: |
          for i in $(seq 1 30); do
            docker exec ci-postgres pg_isready -U textery && break
            sleep 2
          done
          for i in $(seq 1 30); do
            docker exec ci-redis redis-cli ping && break
            sleep 2
          done

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: adapters/db
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

      - name: Stop postgres and redis
        if: always()
        run: docker rm -f ci-postgres ci-redis
