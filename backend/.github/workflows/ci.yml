name: backend-ci

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  # Lint is its own job, not a step in `test`: it needs no Postgres and no
  # migrations, so it answers in seconds and runs in parallel with them. A
  # formatting mistake should not wait on a database to be told.
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install "$(grep -E '^ruff==' requirements.txt)"

      - name: Check lint rules
        run: ruff check --output-format=github .

      - name: Check formatting
        run: ruff format --check .

  # Its own job, and not folded into `lint`: mypy needs the runtime dependencies
  # installed to see FastAPI's and SQLAlchemy's own type information, which the
  # ruff-only job deliberately skips to stay fast. It still needs no database.
  types:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check types
        run: mypy

  # Blocking, not advisory. Every dependency here is pinned to an exact version,
  # which is what makes the build reproducible -- and also what makes a known
  # vulnerability sit in the lockfile until somebody looks. Nobody was looking.
  # It runs on the requirements file rather than the installed environment, so it
  # answers for what deploys, not for whatever the runner happens to have.
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      - name: Check dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --progress-spinner=off

  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://textery:change-me@localhost:5432/textery
      TEST_DATABASE_URL: postgresql://textery:change-me@localhost:5432/textery
      GENERATION_PROVIDER: fake
      # Any value >= 32 bytes: JwtTokenService refuses a shorter HS256 key, and
      # the token tests construct it for real. Not a secret -- CI signs nothing
      # that leaves the runner.
      JWT_SECRET: ci-only-signing-key-padded-to-32-bytes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          sudo pg_ctlcluster 16 main start

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Create database and user
        run: |
          sudo -u postgres psql -c "CREATE USER textery WITH PASSWORD 'change-me' SUPERUSER;"
          sudo -u postgres psql -c "CREATE DATABASE textery OWNER textery;"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: adapters/db
        run: alembic upgrade head

      # The threshold is deliberately below the 98% the suite actually reaches:
      # it is a ratchet against a slice landing with no tests at all, not a
      # target to hover at. Uploading coverage.xml without gating on it made the
      # number visible to anyone who went looking and binding on no one.
      #
      # No upload-artifact step here, unlike the GitHub copy in the root
      # .github/workflows/backend-ci.yml: GitVerse runs `act` in GHES mode, where
      # @actions/artifact v2 (upload-artifact@v4+) is unsupported and fails the
      # job outright -- after the tests have already passed. The gate above is
      # what enforces coverage; the artifact was only ever for a human to read.
      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml:coverage.xml --cov-fail-under=90

      - name: Report coverage
        run: coverage report
