name: backend-ci

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: textery
          POSTGRES_PASSWORD: textery
          POSTGRES_DB: textery
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U textery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://textery:textery@localhost:5432/textery
      REDIS_URL: redis://localhost:6379/0
      GENERATION_PROVIDER: fake

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: adapters/db
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
