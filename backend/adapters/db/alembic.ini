[alembic]
script_location = migrations
# Layer roots for env.py, resolved relative to this file. Alembic's own
# mechanism, so env.py needs no sys.path bootstrap of its own; the two entries
# mirror the `pythonpath` list in ../../pyproject.toml.
prepend_sys_path = . src ../../domain/src

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
