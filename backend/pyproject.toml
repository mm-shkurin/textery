[project]
name = "textery-backend"
version = "0.1.0"
description = "Textery backend — FastAPI, Clean Architecture (domain → usecase → adapters → application)."
requires-python = ">=3.12"
dynamic = ["dependencies"]

[tool.setuptools.dynamic]
dependencies = { file = ["requirements.txt"] }

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

# --- Test runner -------------------------------------------------------------
# `pythonpath` replaces the hand-rolled `sys.path.insert` bootstrap every
# conftest used to carry. The layer roots are listed inner-first, which is also
# the dependency direction: a module can only import what is genuinely below it.
[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = [
    "domain/src",
    "usecase/src",
    "adapters/rest/src",
    "adapters/db/src",
    "adapters/security/src",
    "adapters/generation_provider/src",
    "application/src/app",
    # Test-support roots, for the `statements` test-DSL packages. The two
    # `statements` directories carry no `__init__.py`, so they merge into one
    # implicit namespace package rather than shadowing each other.
    "domain/tests",
    "usecase/tests",
    "adapters/db/tests",
    "adapters/rest/tests",
    "adapters/security/tests",
    "adapters/generation_provider/tests",
]

# --- Linter / formatter ------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["adapters/db/migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C4", "SIM", "UP", "ARG"]
ignore = [
    # FastAPI's whole dependency-injection idiom is a call in a default argument
    # (`Depends(...)`, `Header(...)`). B008 exists for mutable defaults; these are
    # neither mutable nor evaluated per request in a way that surprises anyone.
    "B008",
]

[tool.ruff.lint.per-file-ignores]
# The composition root and the Alembic env import only after they have put the
# layer roots on sys.path — they are the one place that cannot import at top.
"application/src/app/main.py" = ["E402"]
"adapters/db/migrations/env.py" = ["E402"]
# Test doubles implement production ports; an unused argument there is the point
# of the signature, not an oversight.
"**/tests/**" = ["ARG002"]

[tool.ruff.lint.isort]
known-first-party = [
    "access",
    "auth",
    "container",
    "document",
    "dto",
    "error_handling",
    "generation",
    "model",
    "provider",
    "router",
    "security",
    "session",
    "shared",
    "statements",
    "tokens",
]
